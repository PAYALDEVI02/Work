name: Build Docker Image For Stage Branch

on:
  workflow_dispatch:
  pull_request:
    branches: ['dev']
    types: [opened, synchronize, reopened]
  push:
    branches-ignore:
      - main
      - prod
      - stage
      - dev
# Set image name using GitHub context
env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:

   run-junit-tests:
     runs-on: ubuntu-latest
     steps:
     # Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v4
    # Set up JDK 17 using Corretto
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'
    # Run JUnit tests
      - name: Run JUnit tests with Maven
        run: mvn test
     # Upload latest test report
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: target/surefire-reports/

   build-run-push:
    needs: run-junit-tests
    runs-on: ubuntu-latest

    steps:
     # Get current branch name
      - name: Get branch name (push or PR)
        id: get_branch
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi
    # Set ArgoCD branch based on logic
      - name: Determine ArgoCD branch
        id: set_argo_branch
        run: |
          BRANCH="${{ steps.get_branch.outputs.branch }}"
          if [[ "$BRANCH" == "main" ]] || \
             [[ "$BRANCH" == "prod" ]] || \
             [[ "$BRANCH" == "stage" ]] || \
             [[ "$BRANCH" == "dev" ]]; then
            echo "argo_branch=$BRANCH" >> $GITHUB_OUTPUT
          else
            echo "argo_branch=BRANCH" >> $GITHUB_OUTPUT
          fi
     # Checkout branch-specific source code
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get_branch.outputs.branch }}
          fetch-depth: 0
    # Get the latest Git tag
      - name: Get latest tag
        id: get_tag
        run: |
          LATEST_TAG=$(git tag --sort=-creatordate --merged ${{ steps.get_branch.outputs.branch }} | head -n 1)
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          
      # Generate image tag using branch and time
      - name: Generate image tag
        id: image_tag
        run: |
          BRANCH_NAME=$(echo "${{ steps.get_branch.outputs.branch }}" | tr '/' '-')
          DATE_TIME=$(date +'%Y%m%d-%H%M%S')
          IMAGE_TAG="${BRANCH_NAME}-${DATE_TIME}-${{ env.LATEST_TAG }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
    # Convert image name to lowercase
      - name: Convert IMAGE_NAME to lowercase
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    # Authenticate to GitHub Container Registry
      - name: Log in to GHCR
        run: echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    # Build and tag Docker image
      - name: Build and tag Docker image
        run: |
          docker build -t $IMAGE_NAME_LOWER:${{ env.IMAGE_TAG }} .
          docker tag $IMAGE_NAME_LOWER:${{ env.IMAGE_TAG }} $IMAGE_NAME_LOWER:latest
    # Push Docker image to GHCR
      - name: Push Docker image to GHCR
        run: |
          docker push $IMAGE_NAME_LOWER:${{ env.IMAGE_TAG }}
          docker push $IMAGE_NAME_LOWER:latest
          
    # Checkout ArgoCD repo for Kubernetes manifests
      - name: Checkout ArgoCD K8s Repository
        uses: actions/checkout@v4
        with:
          repository: acspbsit/acs-bond-argo-workflows
          token: ${{ secrets.GH_TOKEN }}
          path: k8s-repo
          ref: ${{ steps.set_argo_branch.outputs.argo_branch }}

    # Update image tag in deployment file
      - name: Update image tag in deployment
        run: |
          cd k8s-repo/
          yq e 'select(.kind == "Deployment")
            .spec.template.spec.containers[0].image = strenv(IMAGE_NAME_LOWER) + ":" + strenv(IMAGE_TAG)' \
            --inplace \
            bond-microservices/${{ github.event.repository.name }}/${{ github.event.repository.name }}.yaml
      
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add bond-microservices/${{ github.event.repository.name }}/${{ github.event.repository.name }}.yaml
          git commit -m "Update image tag for ${{ github.event.repository.name }} to ${{ env.IMAGE_TAG }}"
          git push
